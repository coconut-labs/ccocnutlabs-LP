<?xml version="1.0" encoding="UTF-8"?>
<!--
  Coconut Labs favicon — collapses the cellular vocabulary (4 dots + 3 dotted
  dividers + brackets) to its essence: four dots in a 2x2 grid. Reads cleanly
  at every favicon size. Adapts to the user's color scheme.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    circle { fill: #1A1611; }
    @media (prefers-color-scheme: dark) {
      circle { fill: #ECE6D6; }
    }
  </style>
  <circle cx="11" cy="11" r="3"/>
  <circle cx="21" cy="11" r="3"/>
  <circle cx="11" cy="21" r="3"/>
  <circle cx="21" cy="21" r="3"/>
</svg>
